apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lamdis.fullname" . }}-runs
  labels:
    {{- include "lamdis.labels" . | nindent 4 }}
    app.kubernetes.io/component: runs
spec:
  replicas: {{ .Values.runs.replicaCount }}
  selector:
    matchLabels:
      {{- include "lamdis.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: runs
  template:
    metadata:
      labels:
        {{- include "lamdis.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: runs
    spec:
      containers:
        - name: runs
          image: {{ include "lamdis.image" (dict "registry" .Values.global.imageRegistry "image" .Values.runs.image "tag" .Values.global.imageTag) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.runs.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "lamdis.fullname" . }}-config
            - secretRef:
                name: {{ include "lamdis.fullname" . }}-secret
          env:
            - name: PORT
              value: {{ .Values.runs.port | quote }}
            # MongoDB removed - fully migrated to PostgreSQL
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "lamdis.fullname" . }}-secret
                  key: database-url
            - name: API_BASE_URL
              value: "http://{{ include "lamdis.fullname" . }}-api:{{ .Values.api.port }}"
            {{- if and (eq .Values.global.entitlementsMode "license_file") .Values.license.secretName }}
            - name: LAMDIS_LICENSE_PATH
              value: /etc/lamdis/license.jwt
            {{- end }}
          {{- if and (eq .Values.global.entitlementsMode "license_file") .Values.license.secretName }}
          volumeMounts:
            - name: license
              mountPath: /etc/lamdis
              readOnly: true
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.runs.resources | nindent 12 }}
      {{- if and (eq .Values.global.entitlementsMode "license_file") .Values.license.secretName }}
      volumes:
        - name: license
          secret:
            secretName: {{ .Values.license.secretName }}
            items:
              - key: {{ .Values.license.key }}
                path: license.jwt
      {{- end }}
      {{- with .Values.runs.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.runs.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.runs.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
