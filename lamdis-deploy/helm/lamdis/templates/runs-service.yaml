apiVersion: v1
kind: Service
metadata:
  name: {{ include "lamdis.fullname" . }}-runs
  labels:
    {{- include "lamdis.labels" . | nindent 4 }}
    app.kubernetes.io/component: runs
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.runs.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "lamdis.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: runs
