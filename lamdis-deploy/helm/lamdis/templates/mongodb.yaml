{{- if .Values.mongodb.enabled }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "lamdis.fullname" . }}-mongodb
  labels:
    {{- include "lamdis.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongodb
spec:
  serviceName: {{ include "lamdis.fullname" . }}-mongodb
  replicas: 1
  selector:
    matchLabels:
      {{- include "lamdis.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mongodb
  template:
    metadata:
      labels:
        {{- include "lamdis.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mongodb
    spec:
      containers:
        - name: mongodb
          image: {{ .Values.mongodb.image }}
          ports:
            - name: mongodb
              containerPort: 27017
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data/db
          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.mongodb.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.mongodb.storageClassName }}
        storageClassName: {{ .Values.mongodb.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.mongodb.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "lamdis.fullname" . }}-mongodb
  labels:
    {{- include "lamdis.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongodb
spec:
  type: ClusterIP
  ports:
    - port: 27017
      targetPort: mongodb
      protocol: TCP
      name: mongodb
  selector:
    {{- include "lamdis.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mongodb
{{- end }}
