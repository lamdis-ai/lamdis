apiVersion: v1
kind: Service
metadata:
  name: {{ include "lamdis.fullname" . }}-web
  labels:
    {{- include "lamdis.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.web.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "lamdis.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
