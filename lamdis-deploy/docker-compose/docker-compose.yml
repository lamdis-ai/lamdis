##
## Lamdis Self-Hosted — Docker Compose
##
## Usage:
##   cp .env.example .env
##   # Edit .env with your OIDC provider details
##   # Place your license.jwt file in this directory
##   docker compose up -d
##
## Open http://localhost:3000 to access the Lamdis dashboard.
##

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: lamdis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/lamdis-ai/lamdis-api:${LAMDIS_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    env_file: [.env]
    environment:
      LAMDIS_DEPLOYMENT_MODE: self_hosted
      LAMDIS_AUTH_MODE: oidc
      LAMDIS_ENTITLEMENTS_MODE: license_file
      LAMDIS_LICENSE_PATH: /etc/lamdis/license.jwt
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/lamdis
      NATS_URL: nats://nats:4222
    volumes:
      - ./license.jwt:/etc/lamdis/license.jwt:ro
    ports:
      - "${API_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  web:
    image: ghcr.io/lamdis-ai/lamdis-web:${LAMDIS_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    env_file: [.env]
    environment:
      NEXT_PUBLIC_API_URL: http://api:3001
      NEXT_PUBLIC_LAMDIS_API_URL: http://api:3001
      NEXT_PUBLIC_LAMDIS_DEPLOYMENT_MODE: self_hosted
      NEXT_PUBLIC_LAMDIS_AUTH_MODE: oidc
    ports:
      - "${WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 3

  runs:
    image: ghcr.io/lamdis-ai/lamdis-runs:${LAMDIS_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/lamdis
      API_BASE_URL: http://api:3001
      LAMDIS_ENTITLEMENTS_MODE: license_file
      LAMDIS_LICENSE_PATH: /etc/lamdis/license.jwt
    volumes:
      - ./license.jwt:/etc/lamdis/license.jwt:ro
    ports:
      - "${RUNS_PORT:-3101}:3101"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3101/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  nats:
    image: nats:2.10-alpine
    command: ['-js', '-sd', '/data', '-m', '8222']
    restart: unless-stopped
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  postgres-data:
  nats-data:
