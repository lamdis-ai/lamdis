name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      runs: ${{ steps.filter.outputs.runs }}
      web: ${{ steps.filter.outputs.web }}
      packages: ${{ steps.filter.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'lamdis-api/**'
              - 'packages/lamdis-db/**'
              - 'packages/lamdis-sdk/**'
            runs:
              - 'lamdis-runs/**'
              - 'packages/lamdis-db/**'
            web:
              - 'lamdis-web/**'
              - 'packages/lamdis-ui/**'
              - 'packages/lamdis-shared-web/**'
            packages:
              - 'packages/**'

  lint-and-typecheck:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.runs == 'true' || needs.changes.outputs.packages == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx turbo typecheck --filter='...[HEAD^1]'

  test-api:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.api == 'true'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lamdis_test
          POSTGRES_USER: lamdis
          POSTGRES_PASSWORD: lamdis
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U lamdis"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=lamdis-api
        env:
          DATABASE_URL: postgresql://lamdis:lamdis@localhost:5432/lamdis_test
      - run: npm test --workspace=lamdis-api --if-present
        env:
          DATABASE_URL: postgresql://lamdis:lamdis@localhost:5432/lamdis_test

  test-runs:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.runs == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=lamdis-runs
      - run: npm test --workspace=lamdis-runs --if-present

  build-web:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://npm.pkg.github.com
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run build --workspace=lamdis-web
